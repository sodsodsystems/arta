<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTA Survey Tally Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e0dfd8;
    --border2: #c8c7be;
    --text: #1a1a18;
    --text2: #6b6a62;
    --text3: #9b9a92;
    --accent: #1a5c3a;
    --accent-bg: #e8f3ed;
    --accent-text: #0f3d26;
    --danger: #c0392b;
    --danger-bg: #fdf0ee;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 2rem; display: flex; align-items: center; justify-content: space-between; min-height: 56px; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 12px; }
  .logo { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text2); letter-spacing: 0.04em; }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; }

  .controls { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.5rem; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .ctrl-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
  .ctrl-group label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
  select { font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 7px 10px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); width: 100%; cursor: pointer; }
  select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

  .btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 7px 16px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); color: var(--text2); cursor: pointer; transition: all 0.12s; white-space: nowrap; }
  .btn:hover { background: var(--surface2); border-color: var(--border2); color: var(--text); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-accent:hover { background: #0f3d26; border-color: #0f3d26; color: #fff; }
  .btn-danger { border-color: #e8c5c1; color: var(--danger); background: var(--danger-bg); }
  .btn-danger:hover { background: #f7d9d5; }

  .summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: var(--text); }
  .stat-val.green { color: var(--accent); }

  .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

  .cc-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .cc-tag { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--accent-text); background: var(--accent-bg); border-radius: 4px; padding: 3px 8px; min-width: 38px; text-align: center; }
  .cc-opts { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .cc-opt { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .tally-box { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; min-width: 44px; height: 36px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; user-select: none; }
  .tally-box:hover { border-color: var(--accent); background: var(--accent-bg); color: var(--accent-text); }
  .tally-box:active { transform: scale(0.94); }
  .tally-box.has-val { background: var(--accent-bg); border-color: #a8d4bc; color: var(--accent-text); }
  .opt-label { font-size: 10px; color: var(--text3); max-width: 52px; text-align: center; line-height: 1.2; }
  .undo-btn { font-size: 18px; line-height: 1; border: none; background: none; cursor: pointer; color: var(--text3); padding: 4px 6px; border-radius: 4px; }
  .undo-btn:hover { color: var(--danger); background: var(--danger-bg); }

  .sqd-item { margin-bottom: 1rem; }
  .sqd-item:last-child { margin-bottom: 0; }
  .sqd-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .sqd-tag { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: var(--accent-text); background: var(--accent-bg); border-radius: 4px; padding: 2px 7px; flex-shrink: 0; }
  .sqd-q { font-size: 13px; color: var(--text2); }
  .sqd-grid { display: grid; grid-template-columns: repeat(6, 1fr) auto; gap: 5px; align-items: center; }
  .resp-cell { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .resp-box { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; width: 100%; height: 40px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; user-select: none; }
  .resp-box:hover { border-color: var(--accent); background: var(--accent-bg); color: var(--accent-text); }
  .resp-box:active { transform: scale(0.93); }
  .resp-box.has-val { background: var(--accent-bg); border-color: #a8d4bc; color: var(--accent-text); }
  .resp-label { font-size: 9.5px; color: var(--text3); text-align: center; line-height: 1.2; }

  .demo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  .demo-group { display: flex; flex-direction: column; gap: 6px; }
  .demo-group-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
  .demo-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .demo-label { font-size: 13px; color: var(--text2); flex: 1; }
  .demo-controls { display: flex; align-items: center; gap: 4px; }
  .demo-box { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; min-width: 44px; height: 34px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; user-select: none; }
  .demo-box:hover { border-color: var(--accent); background: var(--accent-bg); color: var(--accent-text); }
  .demo-box:active { transform: scale(0.93); }
  .demo-box.has-val { background: var(--accent-bg); border-color: #a8d4bc; color: var(--accent-text); }

  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; font-size: 13px; padding: 8px 18px; border-radius: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 999; }
  .toast.show { opacity: 1; }

  @media (max-width: 600px) {
    main { padding: 1rem; }
    .summary-row { grid-template-columns: 1fr 1fr; }
    .sqd-grid { grid-template-columns: repeat(3, 1fr) auto; }
    header { padding: 0 1rem; }
    .controls { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">ARTA <span>//</span> Tally <span id="saveStatus" style="margin-left: 10px; opacity: 0.6; font-weight: normal; font-size: 11px;"></span></div>
  <div class="header-actions">
    <button class="btn" onclick="backupDB()" title="Save all data to a JSON file">Backup</button>
    <button class="btn" onclick="restoreDB()" title="Restore data from a JSON backup">Restore</button>
    <button class="btn" onclick="importTemplate()" title="Import data from Excel template">Import Template</button>
    <button class="btn btn-accent" onclick="exportExcel()">Export Excel</button>
  </div>
</header>

<main>
  <div class="controls">
    <div class="ctrl-group">
      <label>Service Type</label>
      <select id="svcType" onchange="populateSvc()">
        <option value="Internal">Internal Services</option>
        <option value="External">External Services</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Service Name</label>
      <select id="svcName" onchange="render()"></select>
    </div>
    <div class="ctrl-group">
      <label>Year</label>
      <select id="year" onchange="render()">
        <option>2024</option><option>2025</option><option>2026</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Month</label>
      <select id="month" onchange="render()">
        <option value="Overall">Overall / Yearly Summary</option>
        <option>No date stated</option>
        <option>January</option><option>February</option><option>March</option>
        <option>April</option><option>May</option><option>June</option>
        <option>July</option><option>August</option><option>September</option>
        <option>October</option><option>November</option><option>December</option>
      </select>
    </div>
  </div>

  <div class="summary-row">
    <div class="stat"><div class="stat-label">CC Responses</div><div class="stat-val" id="s-cc">0</div></div>
    <div class="stat"><div class="stat-label">SQD Responses</div><div class="stat-val" id="s-sqd">0</div></div>
    <div class="stat"><div class="stat-label">Strongly Agree %</div><div class="stat-val green" id="s-pct">—</div></div>
  </div>

  <div class="section">
    <div class="section-title">Respondent Profile</div>
    <div class="demo-grid" id="demoSection"></div>
  </div>

  <div class="section">
    <div class="section-title">Citizen's Charter (CC) Awareness</div>
    <div id="ccSection"></div>
  </div>

  <div class="section">
    <div class="section-title">Service Quality Dimensions (SQD)</div>
    <div id="sqdSection"></div>
  </div>


</main>

<div class="toast" id="toast"></div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const INTERNAL = ["Retirement","Separation/Resignation","Request for Clearance Form","Learning and Development Training Interventions","Request for Assistance in Processing of Availment/Entitlement","Application for Leave of Absence","Travel Order/Authority","Request for Monetization of Vacation/Sick Leave","Request for Overtime Services","Issuance of Service and Other Personnel Records","Request for Repair/Service","Application for Water Meter Calibration (LCWD-owned)","Request for Use of Multi-Purpose Hall","Store Requisition Process","Request for Use of LCWD Motor Vehicle","Adjustment of Water Bill","Maintenance of Client Records","Preparation of Issued Materials for Billing","Request for Petty Cash","Request for Payment","Receiving of Documents for GM Signature","Receiving of Documents for GM Action","Request for Documents","Preparation of Advisories"];
const EXTERNAL = ["Issuance of Bid Documents","Job Application","Request for Water Meter Calibration (Client-owned)","Sales of Materials/Supplies","Request for Water Delivery (Lorry Truck)","Application for OJT","Promissory Note","Reclassification","Transfer of Tapping","Reconnection","Request for Certificate of Water Potability","New Connection","Service Closure","Change of Registration","Change of Size","Request for Certificate as Active Consumer","Senior Citizen's Discount","Water Meter Relocation","Reconnection (mainline)","Online Application for New Connection","Inspection","Refund","Bill Endorsement","Request for Other Service","Collection of Payment","Collection of Payment (Bank Transfer)","Receiving of Letters"];

const CC_LABELS = ["CC1","CC2","CC3"];
const CC_OPTS   = ["1","2","3","4"];
const CC_FULL   = [
  "I know what a CC is and I saw this office's CC",
  "I know what a CC is but I did not see this office's CC",
  "I learned of the CC only when I saw this office's CC",
  "I do not know what a CC is and I did not see one in this office"
];

const SQD_LABELS = ["SQD0","SQD1","SQD2","SQD3","SQD4","SQD5","SQD6","SQD7","SQD8"];
const SQD_TEXTS  = [
  "I am satisfied with the service that I availed.",
  "I spent a reasonable amount of time for my transaction.",
  "The office followed the transaction's requirements and steps.",
  "The steps I needed were easy and simple.",
  "I easily found information about my transaction.",
  "I paid a reasonable amount of fees for my transaction.",
  "I feel the office was fair to everyone (walang palakasan).",
  "I was treated courteously; the staff was helpful.",
  "I got what I needed / denial was sufficiently explained."
];
const RESP_SHORT = ["Str. Disagree","Disagree","Neither","Agree","Str. Agree","Not Appl."];
const RESP_FULL  = ["Strongly Disagree","Disagree","Neither Disagree/Agree","Agree","Strongly Agree","Not Applicable"];

const DEMOGRAPHICS = {
  age:        { label: "Age Group",   items: ["19 or lower","20-34","35-49","50-64","65 or higher","Did not specify"] },
  clientType: { label: "Client Type", items: ["Citizen","Business","Government"] },
  sex:        { label: "Sex",         items: ["Male","Female"] }
};

// ── Data ───────────────────────────────────────────────────────────────────
let data = {};
try { data = JSON.parse(localStorage.getItem('lcwd_tally') || '{}'); } catch(e) {}

function key() {
  return document.getElementById('year').value + '||' +
         document.getElementById('svcType').value + '||' +
         document.getElementById('svcName').value + '||' +
         document.getElementById('month').value;
}

// ── Migration Logic ────────────────────────────────────────────────────────
function migrateData() {
  let migrated = false;
  Object.keys(data).forEach(k => {
    // Old key format: Type||Name||Month (2 parts split by ||)
    if (k.split('||').length === 3) {
      const newKey = '2024||' + k;
      if (!data[newKey]) {
        data[newKey] = data[k];
        migrated = true;
      }
      delete data[k];
    }
  });
  if (migrated) save();
}
migrateData();

function save() {
  try { 
    localStorage.setItem('lcwd_tally', JSON.stringify(data)); 
    updateSaveStatus();
  } catch(e) {}
}

function updateSaveStatus() {
  const el = document.getElementById('saveStatus');
  if (!el) return;
  const now = new Date();
  el.textContent = 'Saved at ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  el.style.opacity = '1';
  el.style.color = 'var(--accent)';
  setTimeout(() => { 
    el.style.opacity = '0.6'; 
    el.style.color = 'var(--text3)';
  }, 1000);
}

// ── Checkpoints & Recovery ──────────────────────────────────────────────────
function createCheckpoint(type = 'auto') {
  try {
    const checkpoint = {
      timestamp: new Date().toISOString(),
      type: type,
      data: data
    };
    localStorage.setItem('lcwd_tally_checkpoint', JSON.stringify(checkpoint));
    console.log('Checkpoint created:', type);
  } catch(e) { console.error('Checkpoint failed', e); }
}

function checkRecovery() {
  const chkStr = localStorage.getItem('lcwd_tally_checkpoint');
  if (!chkStr) return;
  
  if (Object.keys(data).length === 0) {
    const checkpoint = JSON.parse(chkStr);
    if (confirm('It looks like your local data is empty, but we found a backup from ' + new Date(checkpoint.timestamp).toLocaleString() + '. Would you like to restore it?')) {
      data = checkpoint.data;
      save();
      render();
      toast('Data recovered from checkpoint!');
    }
  }
}

// Auto-checkpoint every 5 minutes
setInterval(() => createCheckpoint('auto'), 5 * 60 * 1000);

// Sync Tabs
window.addEventListener('storage', function(e) {
  if (e.key === 'lcwd_tally') {
    try { 
      data = JSON.parse(e.newValue || '{}'); 
      render(); 
    } catch(err) {}
  }
});

// Exit protection
window.addEventListener('beforeunload', function(e) {
  if (Object.keys(data).length > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});

function aggregate() {
  const y = document.getElementById('year').value;
  const t = document.getElementById('svcType').value;
  const n = document.getElementById('svcName').value;
  const agg = {
    cc:   { CC1:[0,0,0,0], CC2:[0,0,0,0], CC3:[0,0,0,0] },
    sqd:  {},
    demo: { age:[0,0,0,0,0,0], clientType:[0,0,0], sex:[0,0] }
  };
  SQD_LABELS.forEach(function(s) { agg.sqd[s] = [0,0,0,0,0,0]; });

  const months = ["January","February","March","April","May","June","July","August","September","October","November","December","No date stated"];
  months.forEach(function(m) {
    const k = y + '||' + t + '||' + n + '||' + m;
    const e = data[k];
    if (e) {
      CC_LABELS.forEach(function(cc) {
        for(let i=0; i<4; i++) agg.cc[cc][i] += (e.cc[cc][i] || 0);
      });
      SQD_LABELS.forEach(function(sqd) {
        if (!e.sqd[sqd]) return;
        for(let i=0; i<6; i++) agg.sqd[sqd][i] += (e.sqd[sqd][i] || 0);
      });
      if (e.demo) {
        Object.keys(DEMOGRAPHICS).forEach(function(gk) {
          for(let i=0; i<e.demo[gk].length; i++) agg.demo[gk][i] += (e.demo[gk][i] || 0);
        });
      }
    }
  });
  return agg;
}

function entry() {
  if (document.getElementById('month').value === 'Overall') return aggregate();
  const k = key();
  if (!data[k]) {
    data[k] = {
      cc:   { CC1:[0,0,0,0], CC2:[0,0,0,0], CC3:[0,0,0,0] },
      sqd:  {},
      demo: { age:[0,0,0,0,0,0], clientType:[0,0,0], sex:[0,0] }
    };
    SQD_LABELS.forEach(function(s) { data[k].sqd[s] = [0,0,0,0,0,0]; });
  }
  if (!data[k].demo) {
    data[k].demo = { age:[0,0,0,0,0,0], clientType:[0,0,0], sex:[0,0] };
  }
  return data[k];
}

// ── Populate service dropdown ──────────────────────────────────────────────
function populateSvc() {
  const list = document.getElementById('svcType').value === 'Internal' ? INTERNAL : EXTERNAL;
  document.getElementById('svcName').innerHTML = list.map(function(s) {
    return '<option>' + s + '</option>';
  }).join('');
  render();
}

// ── Master render ──────────────────────────────────────────────────────────
function render() {
  var e = entry();
  renderSummary(e);
  renderDemo(e);
  renderCC(e);
  renderSQD(e);
}

// ── Summary stats ──────────────────────────────────────────────────────────
function renderSummary(e) {
  var ccTotal = e.cc.CC1.reduce(function(a,b){return a+b;},0);
  var sqdTotal = 0, saTotal = 0, validTotal = 0;
  SQD_LABELS.forEach(function(s) {
    sqdTotal  += e.sqd[s].reduce(function(a,b){return a+b;},0);
    saTotal   += e.sqd[s][4];
    validTotal += e.sqd[s][0]+e.sqd[s][1]+e.sqd[s][2]+e.sqd[s][3]+e.sqd[s][4];
  });
  document.getElementById('s-cc').textContent  = ccTotal;
  document.getElementById('s-sqd').textContent = sqdTotal;
  document.getElementById('s-pct').textContent = validTotal > 0 ? Math.round(saTotal/validTotal*100)+'%' : '—';
}

// ── Citizen's Charter ──────────────────────────────────────────────────────
function renderCC(e) {
  document.getElementById('ccSection').innerHTML = CC_LABELS.map(function(cc) {
    var opts = CC_OPTS.map(function(opt, i) {
      var hv = e.cc[cc][i] > 0 ? ' has-val' : '';
      return '<div class="cc-opt">' +
        '<div class="tally-box' + hv + '" onclick="addCC(\'' + cc + '\',' + i + ')" title="' + CC_FULL[i] + '">' + e.cc[cc][i] + '</div>' +
        '<span class="opt-label">' + opt + '</span>' +
        '</div>';
    }).join('');
    return '<div class="cc-row">' +
      '<span class="cc-tag">' + cc + '</span>' +
      '<div class="cc-opts">' + opts + '</div>' +
      '<button class="undo-btn" onclick="undoCC(\'' + cc + '\')" title="Undo last">&#8617;</button>' +
      '</div>';
  }).join('');
}

// ── SQD ───────────────────────────────────────────────────────────────────
function renderSQD(e) {
  document.getElementById('sqdSection').innerHTML = SQD_LABELS.map(function(sqd, idx) {
    var cells = RESP_SHORT.map(function(r, i) {
      var hv = e.sqd[sqd][i] > 0 ? ' has-val' : '';
      return '<div class="resp-cell">' +
        '<div class="resp-box' + hv + '" onclick="addSQD(\'' + sqd + '\',' + i + ')" title="' + RESP_FULL[i] + '">' + e.sqd[sqd][i] + '</div>' +
        '<span class="resp-label">' + r + '</span>' +
        '</div>';
    }).join('');
    return '<div class="sqd-item">' +
      '<div class="sqd-header">' +
        '<span class="sqd-tag">' + sqd + '</span>' +
        '<span class="sqd-q">' + SQD_TEXTS[idx] + '</span>' +
      '</div>' +
      '<div class="sqd-grid">' + cells +
        '<button class="undo-btn" onclick="undoSQD(\'' + sqd + '\')" title="Undo last">&#8617;</button>' +
      '</div>' +
      '</div>';
  }).join('');
}

// ── Demographics ───────────────────────────────────────────────────────────
function renderDemo(e) {
  document.getElementById('demoSection').innerHTML = Object.keys(DEMOGRAPHICS).map(function(gk) {
    var g = DEMOGRAPHICS[gk];
    var rows = g.items.map(function(item, i) {
      var hv = e.demo[gk][i] > 0 ? ' has-val' : '';
      return '<div class="demo-row">' +
        '<span class="demo-label">' + item + '</span>' +
        '<div class="demo-controls">' +
          '<div class="demo-box' + hv + '" onclick="addDemo(\'' + gk + '\',' + i + ')">' + e.demo[gk][i] + '</div>' +
          '<button class="undo-btn" onclick="undoDemo(\'' + gk + '\',' + i + ')" title="Undo">&#8617;</button>' +
        '</div>' +
        '</div>';
    }).join('');
    return '<div class="demo-group"><div class="demo-group-label">' + g.label + '</div>' + rows + '</div>';
  }).join('');
}

// ── Tally actions ──────────────────────────────────────────────────────────
function isOverall() {
  if (document.getElementById('month').value === 'Overall') {
    toast("Editing is disabled in Overall view.");
    return true;
  }
  return false;
}

function addDemo(gk, i)  { if (isOverall()) return; entry().demo[gk][i]++; save(); render(); }
function undoDemo(gk, i) { if (isOverall()) return; var a = entry().demo[gk]; if (a[i] > 0) { a[i]--; save(); render(); } }

function addCC(cc, i)  { if (isOverall()) return; entry().cc[cc][i]++; save(); render(); }
function undoCC(cc)    { if (isOverall()) return; var a = entry().cc[cc]; for (var i = a.length-1; i >= 0; i--) { if (a[i] > 0) { a[i]--; save(); render(); return; } } }

function addSQD(sqd, i)  { if (isOverall()) return; entry().sqd[sqd][i]++; save(); render(); }
function undoSQD(sqd)    { if (isOverall()) return; var a = entry().sqd[sqd]; for (var i = a.length-1; i >= 0; i--) { if (a[i] > 0) { a[i]--; save(); render(); return; } } }

// ── Reset ──────────────────────────────────────────────────────────────────
function resetCurrent() {
  if (isOverall()) return;
  if (!confirm('Reset all tallies for this service and month?')) return;
  createCheckpoint('pre-reset');
  delete data[key()];
  save();
  render();
  toast('Tally reset.');
}

// ── Excel Export ───────────────────────────────────────────────────────────
async function exportExcel() {
  const svc  = document.getElementById('svcName').value;
  const type = document.getElementById('svcType').value;
  const mo   = document.getElementById('month').value;
  const e    = entry();

  toast('Preparing SRS template...');

  try {
    const response = await fetch('SRS HR COPY.xlsx');
    if (!response.ok) throw new Error('Template file not found');
    const arrayBuffer = await response.arrayBuffer();
    const wb = XLSX.read(arrayBuffer, { type: 'buffer' });

    // 1. Populate Summary Sheet (Internal / External)
    const summarySheetName = type;
    const wsSummary = wb.Sheets[summarySheetName];
    if (wsSummary) {
      const range = XLSX.utils.decode_range(wsSummary['!ref']);
      let colIdx = -1;
      const toolName = svc.replace(/[^a-z0-9]/gi, '').toLowerCase();

      // Priority 1: Exact cleaned match
      for (let c = 1; c <= range.e.c; c++) {
        const cell = wsSummary[XLSX.utils.encode_cell({ r: 0, c: c })];
        if (cell && cell.v) {
          const excelName = cell.v.toString().replace(/[^a-z0-9]/gi, '').toLowerCase();
          if (excelName === toolName) { colIdx = c; break; }
        }
      }
      // Priority 2: Fuzzy includes
      if (colIdx === -1) {
        for (let c = 1; c <= range.e.c; c++) {
          const cell = wsSummary[XLSX.utils.encode_cell({ r: 0, c: c })];
          if (cell && cell.v) {
            const excelName = cell.v.toString().replace(/[^a-z0-9]/gi, '').toLowerCase();
            if (excelName.includes(toolName) || toolName.includes(excelName)) { colIdx = c; break; }
          }
        }
      }

      if (colIdx !== -1) {
        // ... (data population stays the same)
        // Demographics
        for (let i = 0; i < 6; i++) wsSummary[XLSX.utils.encode_cell({ r: 2 + i, c: colIdx })] = { v: e.demo.age[i], t: 'n' };
        for (let i = 0; i < 3; i++) wsSummary[XLSX.utils.encode_cell({ r: 9 + i, c: colIdx })] = { v: e.demo.clientType[i], t: 'n' };
        for (let i = 0; i < 2; i++) wsSummary[XLSX.utils.encode_cell({ r: 13 + i, c: colIdx })] = { v: e.demo.sex[i], t: 'n' };
        // CC
        for (let i = 0; i < 4; i++) wsSummary[XLSX.utils.encode_cell({ r: 17 + i, c: colIdx })] = { v: e.cc.CC1[i], t: 'n' };
        for (let i = 0; i < 4; i++) wsSummary[XLSX.utils.encode_cell({ r: 22 + i, c: colIdx })] = { v: e.cc.CC2[i], t: 'n' };
        for (let i = 0; i < 4; i++) wsSummary[XLSX.utils.encode_cell({ r: 27 + i, c: colIdx })] = { v: e.cc.CC3[i], t: 'n' };
        // SQD
        for (let s = 0; s < 9; s++) {
          const startRow = 34 + (s * 7);
          const sqdKey = "SQD" + s;
          for (let i = 0; i < 6; i++) wsSummary[XLSX.utils.encode_cell({ r: startRow + i, c: colIdx })] = { v: e.sqd[sqdKey][i], t: 'n' };
        }
      }
    }

    // 2. Populate Service-Specific Sheet
    let svcSheetName = null;
    const cleanToolName = svc.replace(/[^a-z0-9]/gi, '').toLowerCase();
    
    // Priority 1: Exact cleaned match
    for (let name of wb.SheetNames) {
      if (name.replace(/[^a-z0-9]/gi, '').toLowerCase() === cleanToolName) { svcSheetName = name; break; }
    }
    // Priority 2: Fuzzy includes
    if (!svcSheetName) {
      for (let name of wb.SheetNames) {
        const cleanName = name.replace(/[^a-z0-9]/gi, '').toLowerCase();
        if (cleanName.includes(cleanToolName) || cleanToolName.includes(cleanName)) { svcSheetName = name; break; }
      }
    }

    if (svcSheetName && wb.Sheets[svcSheetName]) {
      const wsSvc = wb.Sheets[svcSheetName];
      CC_LABELS.forEach((cc, rOff) => {
        for (let i = 0; i < 4; i++) wsSvc[XLSX.utils.encode_cell({ r: 3 + rOff, c: 2 + i })] = { v: e.cc[cc][i], t: 'n' };
      });
      SQD_LABELS.forEach((sqd, rOff) => {
        for (let i = 0; i < 6; i++) wsSvc[XLSX.utils.encode_cell({ r: 3 + rOff, c: 9 + i })] = { v: e.sqd[sqd][i], t: 'n' };
      });
    }

    const filename = 'ARTA_Tally_' + type + '_' + svc.replace(/[^a-z0-9]/gi,'_').substring(0,30) + '_' + mo + '.xlsx';
    XLSX.writeFile(wb, filename);
    toast('Excel template filled and downloaded!');
  } catch (err) {
    console.error(err);
    toast('Template Error: ' + err.message);
  }
}

// ── Maintenance & Import ────────────────────────────────────────────────────
function backupDB() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ARTA_Tally_Backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  toast('Backup downloaded!');
}

function restoreDB() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const imported = JSON.parse(reader.result);
        if (confirm('Overwrite current local database with this backup?')) {
          createCheckpoint('pre-restore');
          data = imported;
          save();
          render();
          toast('Data restored!');
        }
      } catch(err) { toast('Error: Invalid JSON backup file'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function importTemplate() {
  if (isOverall()) return;
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.xlsx';
  input.onchange = async e => {
    const file = e.target.files[0];
    toast('Parsing template...');
    createCheckpoint('pre-import');
    try {
      const arrayBuffer = await file.arrayBuffer();
      const wb = XLSX.read(arrayBuffer, { type: 'buffer' });
      const svc = document.getElementById('svcName').value;
      const type = document.getElementById('svcType').value;
      const mo = document.getElementById('month').value;
      const ws = wb.Sheets[type];
      if (!ws) throw new Error('Summary sheet "' + type + '" not found in file');
      
      const range = XLSX.utils.decode_range(ws['!ref']);
      let colIdx = -1;
      const toolName = svc.replace(/[^a-z0-9]/gi, '').toLowerCase();
      
      // Exact cleaned match first
      for (let c = 1; c <= range.e.c; c++) {
        const cell = ws[XLSX.utils.encode_cell({ r: 0, c: c })];
        if (cell && cell.v) {
          const excelName = cell.v.toString().replace(/[^a-z0-9]/gi, '').toLowerCase();
          if (excelName === toolName) { colIdx = c; break; }
        }
      }
      // Fuzzy if not found
      if (colIdx === -1) {
        for (let c = 1; c <= range.e.c; c++) {
          const cell = ws[XLSX.utils.encode_cell({ r: 0, c: c })];
          if (cell && cell.v) {
            const excelName = cell.v.toString().replace(/[^a-z0-9]/gi, '').toLowerCase();
            if (excelName.includes(toolName) || toolName.includes(excelName)) { colIdx = c; break; }
          }
        }
      }
      
      if (colIdx === -1) throw new Error('Service "' + svc + '" not found in Excel sheet');
      
      const entryObj = entry();
      const parseVal = v => (v && v.v != null) ? Number(v.v) || 0 : 0;
      
      // Extract Data (Mapping same rows as export)
      for (let i = 0; i < 6; i++) {
        entryObj.demo.age[i] = parseVal(ws[XLSX.utils.encode_cell({ r: 2 + i, c: colIdx })]);
      }
      for (let i = 0; i < 3; i++) {
        entryObj.demo.clientType[i] = parseVal(ws[XLSX.utils.encode_cell({ r: 9 + i, c: colIdx })]);
      }
      for (let i = 0; i < 2; i++) {
        entryObj.demo.sex[i] = parseVal(ws[XLSX.utils.encode_cell({ r: 13 + i, c: colIdx })]);
      }
      for (let i = 0; i < 4; i++) {
        entryObj.cc.CC1[i] = parseVal(ws[XLSX.utils.encode_cell({ r: 17 + i, c: colIdx })]);
        entryObj.cc.CC2[i] = parseVal(ws[XLSX.utils.encode_cell({ r: 22 + i, c: colIdx })]);
        entryObj.cc.CC3[i] = parseVal(ws[XLSX.utils.encode_cell({ r: 27 + i, c: colIdx })]);
      }
      for (let s = 0; s < 9; s++) {
        const startRow = 34 + (s * 7);
        const sqdKey = "SQD" + s;
        for (let i = 0; i < 6; i++) {
          entryObj.sqd[sqdKey][i] = parseVal(ws[XLSX.utils.encode_cell({ r: startRow + i, c: colIdx })]);
        }
      }
      
      save();
      render();
      toast('Imported ' + svc + ' data into ' + mo);
    } catch(err) {
      console.error(err);
      toast('Import Error: ' + err.message);
    }
  };
  input.click();
}

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2000);
}

// ── Init ───────────────────────────────────────────────────────────────────
updateSaveStatus();
checkRecovery();
populateSvc();
